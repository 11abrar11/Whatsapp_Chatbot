# ============================================================
# PP5 WhatsApp AI Chatbot — Docker Compose
# ============================================================
# Services:
#   - qdrant:     Vector database for RAG knowledge retrieval
#   - backend:    FastAPI app (all business logic)
#   - baileys:    WhatsApp connection via Baileys (WhatsApp Web)
#   - n8n:        Webhook receiver (optional, thin router)
#   - ingestion:  One-shot pipeline to load knowledge base into Qdrant
#
# Usage:
#   Start all services:
#     docker compose up -d
#
#   Run ingestion (first time or after KB update):
#     docker compose --profile ingestion run --rm ingestion
#
#   View logs:
#     docker compose logs -f backend baileys
#
#   Stop all:
#     docker compose down
# ============================================================

services:
  # === Qdrant Vector Database ===
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pp5-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # === FastAPI Backend (All Business Logic) ===
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: pp5-backend
    ports:
      - "8000:8000"
    env_file:
      - ../config/.env
    environment:
      - BAILEYS_SERVICE_URL=http://baileys:3001
    volumes:
      - ../config:/app/config:ro
      - ../prompts:/app/prompts:ro
    depends_on:
      qdrant:
        condition: service_started
      baileys:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s

  # === Baileys WhatsApp Client ===
  baileys:
    build:
      context: ..
      dockerfile: docker/Dockerfile.baileys
    container_name: pp5-baileys
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=http://backend:8000
      - BAILEYS_PORT=3001
    volumes:
      - ../baileys/auth_info:/app/baileys/auth_info
    restart: unless-stopped
    # Note: On first run, check logs for QR code:
    #   docker compose logs -f baileys


  # === Knowledge Base Ingestion (One-Shot, On-Demand) ===
  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestion
    container_name: pp5-ingestion
    env_file:
      - ../config/.env
    volumes:
      - ../config:/app/config:ro
      - ../knowledge_base:/app/knowledge_base:ro
    depends_on:
      qdrant:
        condition: service_started
    profiles:
      - ingestion

volumes:
  qdrant_storage:
    name: pp5_qdrant_storage

